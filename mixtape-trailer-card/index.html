<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Mixtape Trailer Card</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html,
      body {
        width: 1080px;
        height: 1920px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000000;
      }

      #mixtape-trailer-card {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000000;
        color: #fff4dd;
        font-family: "Noto Sans Japanese", sans-serif;
        isolation: isolate;
      }

      .black-bg {
        position: absolute;
        inset: 0;
        background: #000000;
        z-index: 0;
      }

      .matte {
        position: absolute;
        background: #000000;
        z-index: 14;
        pointer-events: none;
      }

      .matte-top {
        left: 0;
        top: 0;
        width: 1080px;
        height: 300px;
      }

      .matte-bottom {
        left: 0;
        top: 1380px;
        width: 1080px;
        height: 540px;
      }

      .matte-left {
        left: 0;
        top: 300px;
        width: 54px;
        height: 1080px;
      }

      .matte-right {
        right: 0;
        top: 300px;
        width: 54px;
        height: 1080px;
      }

      .frame {
        position: absolute;
        left: 54px;
        top: 300px;
        width: 972px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
        border: 0;
        box-shadow: none;
        z-index: 1;
      }

      .media {
        position: absolute;
        left: 54px;
        top: 300px;
        width: 972px;
        height: 1080px;
        object-fit: cover;
        object-position: center center;
        background: #000000;
        filter: saturate(1.08) contrast(1.04) brightness(1);
        z-index: 2;
      }

      .shade {
        position: absolute;
        left: 54px;
        top: 300px;
        width: 972px;
        height: 1080px;
        z-index: 5;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.12) 0%, rgba(0, 0, 0, 0) 26%, rgba(0, 0, 0, 0) 62%, rgba(0, 0, 0, 0.58) 100%);
      }

      .grain {
        position: absolute;
        inset: 0;
        z-index: 30;
        pointer-events: none;
        display: none;
      }

      .corner-title,
      .corner-studio {
        position: absolute;
        z-index: 18;
        color: #fff4dd;
        text-shadow: 0 3px 18px rgba(0, 0, 0, 0.78);
      }

      .corner-title {
        left: 88px;
        bottom: 570px;
        font-size: 34px;
        line-height: 1.18;
        font-weight: 900;
      }

      .corner-title .en {
        display: block;
        margin-top: 5px;
        color: #f2d46b;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        letter-spacing: 0;
      }

      .corner-studio {
        right: 84px;
        top: 334px;
        padding: 10px 14px;
        background: rgba(0, 0, 0, 0.34);
        border: 1px solid rgba(255, 244, 221, 0.28);
        font-family: "IBM Plex Mono", monospace;
        font-size: 18px;
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: 0;
        text-align: right;
      }

      .corner-studio span {
        display: block;
      }

      .caption {
        position: absolute;
        left: 94px;
        right: 94px;
        bottom: 705px;
        z-index: 20;
        color: #fff4dd;
        font-size: 42px;
        line-height: 1.22;
        font-weight: 900;
        text-shadow:
          0 4px 18px rgba(0, 0, 0, 0.96),
          0 0 3px rgba(0, 0, 0, 0.96);
      }

      .caption .char {
        display: inline-block;
        min-width: 0.5em;
        opacity: 0;
      }

      .story-caption {
        font-size: 40px;
        color: #f2d46b;
      }

      .story-card {
        position: absolute;
        left: 88px;
        right: 88px;
        top: 720px;
        z-index: 19;
        color: #fff4dd;
        font-size: 58px;
        line-height: 1.08;
        font-weight: 900;
        text-shadow:
          0 6px 24px rgba(0, 0, 0, 0.96),
          0 0 3px rgba(0, 0, 0, 0.96);
      }

      .story-card .accent {
        display: block;
        margin-top: 12px;
        color: #ffe58a;
        font-size: 34px;
        line-height: 1.18;
      }

      .score-card {
        position: absolute;
        left: 94px;
        right: 94px;
        bottom: 745px;
        z-index: 21;
      }

      .score-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        opacity: 0;
      }

      .score {
        min-height: 102px;
        padding: 17px 18px;
        box-sizing: border-box;
        background: rgba(255, 244, 221, 0.96);
        color: #050506;
        border-left: 7px solid #ff5aa5;
        font-family: "IBM Plex Mono", monospace;
      }

      .score::before {
        content: attr(data-main);
        display: block;
        font-size: 31px;
        line-height: 1;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
      }

      .score::after {
        content: attr(data-sub);
        display: block;
        margin-top: 8px;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 800;
      }

      .cut-flash {
        position: absolute;
        inset: 0;
        z-index: 40;
        pointer-events: none;
        opacity: 0;
        background: #fff4dd;
        mix-blend-mode: screen;
      }
    </style>
  </head>
  <body>
    <div id="mixtape-trailer-card" data-composition-id="mixtape-trailer-card" data-start="0" data-duration="47" data-width="1080" data-height="1920">
      <div class="black-bg"></div>
      <div class="frame"></div>
      <div class="matte matte-top"></div>
      <div class="matte matte-bottom"></div>
      <div class="matte matte-left"></div>
      <div class="matte matte-right"></div>

      <video id="v00" class="clip media" src="assets/clips-v6/clip00.mp4" data-start="0" data-duration="4" data-track-index="0" muted playsinline></video>
      <video id="v01" class="clip media" src="assets/clips-v6/clip01.mp4" data-start="4" data-duration="3.2" data-track-index="0" muted playsinline></video>
      <video id="v02" class="clip media" src="assets/clips-v6/clip02.mp4" data-start="7.2" data-duration="3.3" data-track-index="0" muted playsinline></video>
      <video id="v03" class="clip media" src="assets/clips-v6/clip03.mp4" data-start="10.5" data-duration="3.2" data-track-index="0" muted playsinline></video>
      <video id="v04" class="clip media" src="assets/clips-v6/clip04.mp4" data-start="13.7" data-duration="3.2" data-track-index="0" muted playsinline></video>
      <video id="v05" class="clip media" src="assets/clips-v6/clip05.mp4" data-start="16.9" data-duration="3.3" data-track-index="0" muted playsinline></video>
      <video id="v06" class="clip media" src="assets/clips-v6/clip06.mp4" data-start="20.2" data-duration="3" data-track-index="0" muted playsinline></video>
      <video id="v07" class="clip media" src="assets/clips-v6/clip07.mp4" data-start="23.2" data-duration="3.5" data-track-index="0" muted playsinline></video>
      <video id="v08" class="clip media" src="assets/clips-v6/clip08.mp4" data-start="26.7" data-duration="3.3" data-track-index="0" muted playsinline></video>
      <video id="v09" class="clip media" src="assets/clips-v6/clip09.mp4" data-start="30" data-duration="3.5" data-track-index="0" muted playsinline></video>
      <video id="v10" class="clip media" src="assets/clips-v6/clip10.mp4" data-start="33.5" data-duration="3.5" data-track-index="0" muted playsinline></video>
      <video id="v11" class="clip media" src="assets/clips-v6/clip11.mp4" data-start="37" data-duration="3.7" data-track-index="0" muted playsinline></video>
      <video id="v12" class="clip media" src="assets/clips-v6/clip12.mp4" data-start="40.7" data-duration="3.3" data-track-index="0" muted playsinline></video>
      <video id="v13" class="clip media" src="assets/clips-v6/clip13.mp4" data-start="44" data-duration="3" data-track-index="0" muted playsinline></video>

      <audio id="final-mix" src="assets/audio/final-mix-v6.m4a" data-start="0" data-duration="47" data-track-index="10" data-volume="1"></audio>

      <div class="shade"></div>
      <div class="grain"></div>

      <div class="corner-title">
        混音青春
        <span class="en">MIXTAPE</span>
      </div>
      <div class="corner-studio"><span>BEETHOVEN</span><span>& DINOSAUR</span></div>

      <div id="story00" class="clip story-card" data-start="0.55" data-duration="3.2" data-track-index="18">
        一盘磁带
        <span class="accent">翻出三个人的最后一晚</span>
      </div>
      <div id="story01" class="clip story-card" data-start="20.45" data-duration="3.55" data-track-index="18">
        他们探索的
        <span class="accent">不是派对，是告别前的友情</span>
      </div>

      <div id="cap00" class="clip caption karaoke" data-start="4.2" data-duration="3.6" data-track-index="20" data-text="毕业前最后一晚，洛克福德把歌单按下播放。"></div>
      <div id="cap01" class="clip caption karaoke" data-start="9.0" data-duration="4.0" data-track-index="20" data-text="她和斯莱特、卡桑德拉，要去卡米尔的海边派对。"></div>
      <div id="cap02" class="clip caption karaoke" data-start="14.2" data-duration="4.2" data-track-index="20" data-text="先回家找线索，再去卡桑德拉那边。"></div>
      <div id="cap03" class="clip caption karaoke story-caption" data-start="24.4" data-duration="4.2" data-track-index="20" data-text="每一首歌，都打开一段旧回忆。"></div>
      <div id="cap04" class="clip caption karaoke story-caption" data-start="30.1" data-duration="4.3" data-track-index="20" data-text="公路、屋顶、烟火和追车，全都被青春点燃。"></div>
      <div id="cap05" class="clip caption karaoke story-caption" data-start="34.55" data-duration="2.05" data-track-index="20" data-text="这不是怀旧，是最后一次把音量开满。"></div>

      <div id="score" class="clip score-card" data-start="37.05" data-duration="3.55" data-track-index="21">
        <div class="score-wrap">
          <div class="score" data-main="IGN 10/10" data-sub="媒体满分"></div>
          <div class="score" data-main="GameSpot 9" data-sub="Superb"></div>
          <div class="score" data-main="Metacritic 86" data-sub="综合评分"></div>
          <div class="score" data-main="Steam 特别好评" data-sub="用户评价"></div>
        </div>
      </div>

      <div id="flash" class="cut-flash"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const cutStarts = [4, 7.2, 10.5, 13.7, 16.9, 20.2, 23.2, 26.7, 30, 33.5, 37, 40.7, 44];

      document.querySelectorAll(".karaoke").forEach((node) => {
        const chars = Array.from(node.dataset.text || "");
        node.innerHTML = chars.map((char) => `<span class="char">${char === " " ? "&nbsp;" : char}</span>`).join("");
      });

      tl.from(".frame", { scale: 0.985, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.08);
      tl.from(".corner-title", { x: -26, y: 14, opacity: 0, duration: 0.42, ease: "power4.out" }, 0.75);
      tl.from(".corner-studio", { x: 24, opacity: 0, duration: 0.36, ease: "circ.out" }, 0.95);

      document.querySelectorAll(".story-card").forEach((node) => {
        const id = `#${node.id}`;
        const start = Number(node.getAttribute("data-start"));
        const duration = Number(node.getAttribute("data-duration"));
        tl.from(id, { y: 22, opacity: 0, duration: 0.28, ease: "power3.out" }, start + 0.05);
        tl.to(id, { y: -18, opacity: 0, duration: 0.26, ease: "power2.in" }, start + duration - 0.34);
      });

      document.querySelectorAll(".karaoke").forEach((node) => {
        const id = `#${node.id}`;
        const start = Number(node.getAttribute("data-start"));
        const duration = Number(node.getAttribute("data-duration"));
        const charCount = node.querySelectorAll(".char").length;
        const each = Math.max(0.035, (duration * 0.78) / Math.max(1, charCount));
        tl.fromTo(`${id} .char`, { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.08, stagger: { each }, ease: "power2.out" }, start + 0.08);
      });

      tl.set("#score .score-wrap", { opacity: 1 }, 37.05);
      tl.from("#score .score", { y: 24, opacity: 0, duration: 0.22, stagger: 0.055, ease: "back.out(1.25)" }, 37.16);
      tl.set("#score .score-wrap", { opacity: 0, visibility: "hidden" }, 40.56);

      cutStarts.forEach((at, index) => {
        const peak = index % 4 === 0 ? 0.18 : 0.1;
        tl.fromTo("#flash", { opacity: peak }, { opacity: 0, duration: 0.16, ease: "power2.out" }, at);
      });

      tl.to([".corner-title", ".corner-studio"], { opacity: 0, duration: 0.34, ease: "power2.in" }, 40.65);
      tl.set([".corner-title", ".corner-studio"], { opacity: 0, visibility: "hidden" }, 41.02);

      window.__timelines["mixtape-trailer-card"] = tl;
    </script>
  </body>
</html>
